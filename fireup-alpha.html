<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#121212" />
  <title>FireUp — Alpha Testing</title>
  <meta name="description" content="FireUp Alpha Testing — aplikace pro návyky, úkoly a dlouhodobý progres." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .alpha-nav .nav-links a.active { color: #fff; }
    .alpha-hero { overflow: hidden; }
    .alpha-logo { display: block; width: min(72vw, 360px); margin: 0 auto 1.15rem; }
    .alpha-label { margin: 0; color: var(--text-dim); font: 600 clamp(.68rem, 1.4vw, .82rem)/1 var(--font-display); letter-spacing: .18em; }
    .alpha-hero .hero-desc { max-width: 38rem; }
    .alpha-hero .hero-cta { margin-top: 2.3rem; }
    .alpha-note { margin-top: 1.7rem; color: var(--text-dim); font-size: .8rem; letter-spacing: .04em; }
    @media (max-width: 960px) {
      .alpha-nav .alpha-nav-back { display: inline-flex; font-size: .68rem; padding: .52rem .85rem; }
    }
    @media (max-width: 768px) {
      .alpha-hero { padding-top: 7rem; padding-bottom: 5rem; }
      .alpha-logo { width: min(76vw, 300px); margin-bottom: 1rem; }
      .alpha-hero .hero-desc { margin-top: 1.5rem; max-width: 33rem; }
      .alpha-hero .hero-cta { width: min(100%, 340px); flex-direction: column; gap: .7rem; }
      .alpha-hero .hero-cta .btn { width: 100%; }
      .alpha-note { margin-top: 1.35rem; font-size: .68rem; }
    }
    @media (max-width: 480px) {
      .alpha-nav { left: 10px; right: 10px; }
      .alpha-nav .nav-logo { font-size: .92rem; }
      .alpha-hero .hero-sub-line { font-size: .7rem; letter-spacing: .1em; }
    }
  </style>
</head>
<body>
  <div class="cursor-dot" id="cursorDot"></div>
  <div class="cursor-ring" id="cursorRing"></div>
  <div class="bg-fx" aria-hidden="true">
    <video class="bg-video" autoplay muted loop playsinline preload="auto"><source src="assets/bg-video.mp4" type="video/mp4" /></video>
    <div class="bg-video-overlay"></div>
  </div>
  <header class="nav alpha-nav">
    <a href="index.html#top" class="nav-logo">MICHAEL</a>
    <nav class="nav-links" aria-label="Navigace">
      <a href="index.html#top">Portfolio</a>
      <a href="fireup-alpha.html" class="active">FireUp Alpha</a>
    </nav>
    <div class="nav-right"><a href="index.html#top" class="nav-cta alpha-nav-back">Zpět na portfolio</a></div>
  </header>
  <main>
    <section class="hero alpha-hero">
      <img class="alpha-logo" src="assets/fireup-logo-transparent.png" alt="FireUp" />
      <p class="alpha-label">ALPHA TESTING</p>
      <p class="hero-desc">Aplikace pro návyky, úkoly a dlouhodobý progres. Pomáhá dát tvým ambicím směr a budovat disciplínu každý den.</p>
      <div class="hero-cta">
        <a class="btn btn-primary" href="https://drive.google.com/file/d/1XCFKYwgIGp7cl-cR1j8GHdlt7uGXHxpn/view?usp=sharing" target="_blank" rel="noreferrer">Stáhnout Alpha APK</a>
        <a class="btn btn-ghost" href="https://discord.gg/AG5q3e22E" target="_blank" rel="noreferrer">Discord &amp; feedback</a>
      </div>
    </section>
  </main>
  <script>
    (() => {
      if (!window.matchMedia('(hover: hover)').matches) return;
      const ring = document.getElementById('cursorRing');
      let mouseX = -100, mouseY = -100, ringX = -100, ringY = -100;
      window.addEventListener('mousemove', event => { mouseX = event.clientX; mouseY = event.clientY; }, { passive: true });
      const render = () => {
        ringX += (mouseX - ringX) * .32;
        ringY += (mouseY - ringY) * .32;
        ring.style.transform = `translate(${ringX}px, ${ringY}px) translate(-50%, -50%)`;
        requestAnimationFrame(render);
      };
      document.querySelectorAll('a').forEach(link => {
        link.addEventListener('mouseenter', () => ring.classList.add('hovering'));
        link.addEventListener('mouseleave', () => ring.classList.remove('hovering'));
      });
      render();
    })();
  </script>
</body>
</html>
