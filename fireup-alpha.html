<!doctype html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#121212" />
  <title>FireUp — Alpha Testing</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .alpha-page { min-height: 100vh; display: grid; place-items: center; padding: 110px 20px 48px; }
    .alpha-card { width: min(100%, 680px); padding: clamp(28px, 6vw, 54px); border: 1px solid rgba(255,255,255,.14); border-radius: 28px; background: rgba(18,18,18,.72); backdrop-filter: blur(24px); text-align: center; box-shadow: 0 32px 90px rgba(0,0,0,.42); }
    .alpha-kicker { display: inline-flex; align-items: center; gap: 8px; padding: 7px 11px; border: 1px solid rgba(255,255,255,.16); border-radius: 999px; color: var(--text-dim); font: 600 .7rem/1 var(--font-display); letter-spacing: .08em; }
    .alpha-dot { width: 8px; height: 8px; border-radius: 50%; background: #8f8d88; box-shadow: 0 0 14px rgba(255,255,255,.45); }
    .alpha-card h1 { margin: 22px 0 16px; font: 800 clamp(2rem, 7vw, 4rem)/1.1 var(--font-display); letter-spacing: -.06em; }
    .alpha-card p { max-width: 510px; margin: 0 auto; color: var(--text-dim); font-size: clamp(1rem, 2vw, 1.08rem); }
    .alpha-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; margin-top: 30px; }
    .alpha-button { display: inline-flex; align-items: center; justify-content: center; min-height: 48px; padding: 0 20px; border: 1px solid rgba(255,255,255,.24); border-radius: 14px; background: #f2f1ed; color: #121212; font-weight: 800; transition: transform .2s ease, background .2s ease; }
    .alpha-button:hover { transform: translateY(-2px); background: #fff; }
    .alpha-back { background: rgba(255,255,255,.05); color: var(--text); }
    .alpha-back:hover { background: rgba(255,255,255,.1); }
  </style>
</head>
<body>
  <div class="bg-fx" aria-hidden="true"><div class="bg-video-overlay"></div></div>
  <header class="nav">
    <a href="index.html#top" class="nav-logo">MICHAEL</a>
    <div class="nav-right"><a href="index.html#top" class="nav-cta">Zpět na portfolio</a></div>
  </header>
  <main class="alpha-page">
    <section class="alpha-card">
      <div class="alpha-kicker"><span class="alpha-dot"></span> FIREUP · ALPHA TESTING</div>
      <h1>Buduj disciplínu.<br><span class="outline-text">Každý den.</span></h1>
      <p>FireUp je aplikace pro návyky, úkoly a dlouhodobý progres. Alpha testování je omezené na malou skupinu testerů.</p>
      <div class="alpha-actions">
        <a class="alpha-button" href="https://drive.google.com/file/d/1XCFKYwgIGp7cl-cR1j8GHdlt7uGXHxpn/view?usp=sharing" target="_blank" rel="noreferrer">Stáhnout Alpha APK</a>
        <a class="alpha-button alpha-back" href="https://discord.gg/AG5q3e22E" target="_blank" rel="noreferrer">Discord &amp; feedback</a>
        <a class="alpha-button alpha-back" href="index.html#top">Portfolio</a>
      </div>
    </section>
  </main>
</body>
</html>
